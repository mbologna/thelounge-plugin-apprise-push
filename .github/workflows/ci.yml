name: CI

"on":
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  ci:
    uses: mbologna/.github/.github/workflows/node-ci.yml@0dd1207f90e4077eab02f6a0918f4c59a0d97431 # main
    with:
      node_version: lts/*
      package_manager: npm
      test_command: "test"
      enable_audit: true
      enable_release_drafter: true

  auto-release:
    if: github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/auto-release.yml@0dd1207f90e4077eab02f6a0918f4c59a0d97431 # main
    with:
      strategy: commits
    secrets: inherit
