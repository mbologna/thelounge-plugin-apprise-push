name: CI

"on":
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  ci:
    uses: mbologna/.github/.github/workflows/node-ci.yml@34ce8b02522b62bb27e3d27ea66b46f6174be561 # main
    with:
      enable_release_drafter: true

  auto-release:
    if: github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/auto-release.yml@34ce8b02522b62bb27e3d27ea66b46f6174be561 # main
    with:
      strategy: commits
    secrets: inherit
