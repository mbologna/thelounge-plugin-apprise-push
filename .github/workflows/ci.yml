name: CI

"on":
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  ci:
    uses: mbologna/.github/.github/workflows/node-ci.yml@17e62b3f3f9e7985d155f652d47162ffada15cb6 # main
    with:
      enable_release_drafter: true

  auto-release:
    if: github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/auto-release.yml@17e62b3f3f9e7985d155f652d47162ffada15cb6 # main
    with:
      strategy: commits
    secrets: inherit
