    uses: mbologna/.github/.github/workflows/npm-publish.yml@af64a3169c2eb27c42434346d87d7116b44ec401 # main
    with:
      node_version: lts/*
      package_manager: npm
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
