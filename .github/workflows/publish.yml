name: Publish to npm

"on":
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: mbologna/.github/.github/workflows/npm-publish.yml@0dd1207f90e4077eab02f6a0918f4c59a0d97431 # main
    with:
      node_version: lts/*
      package_manager: npm
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
