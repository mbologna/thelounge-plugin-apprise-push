name: Publish to npm

"on":
  release:
    types: [published]

jobs:
  publish:
    uses: mbologna/.github/.github/workflows/npm-publish.yml@6c12a94fd79c0e0b037fd126e568aa4f1f8e39f3 # main
    with:
      node_version: lts/*
      package_manager: npm
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
