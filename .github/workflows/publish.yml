name: Publish to npm

"on":
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: mbologna/.github/.github/workflows/npm-publish.yml@da191150b8ae5eefd50d0bfa6b6b4d7a012a1dd6 # main
    with:
      node_version: lts/*
      package_manager: npm
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
