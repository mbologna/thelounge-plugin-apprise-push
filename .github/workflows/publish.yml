name: Publish to npm

"on":
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: mbologna/.github/.github/workflows/npm-publish.yml@58a29797bb89eee962c0cb2ce81abd2b38de5e54 # main
    with:
      node_version: lts/*
      package_manager: npm
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
