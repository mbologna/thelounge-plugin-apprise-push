name: Publish to npm

"on":
  release:
    types: [published]

jobs:
  publish:
    uses: mbologna/.github/.github/workflows/npm-publish.yml@17e62b3f3f9e7985d155f652d47162ffada15cb6 # main
    with:
      node_version: lts/*
      package_manager: npm
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
